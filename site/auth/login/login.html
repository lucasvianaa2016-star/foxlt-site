<input id="user">
<input id="pass">
<button onclick="login()">entrar</button>

<script>
async function login() {
  const res = await fetch("https://SEU-RENDER/login", {
    method: "POST",
    headers: {"Content-Type":"application/json"},
    body: JSON.stringify({
      username: user.value,
      password: pass.value
    })
  });

  const data = await res.json();

  if (!res.ok) {
    alert("erro login");
    return;
  }

  localStorage.setItem("role", data.role);

  if (data.role === "admin") {
    window.location.href = "/adminlg";
  } else {
    window.location.href = "/dashboard";
  }
}
</script>
