<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <title>Fox LT Dashboard</title>
  <link rel="stylesheet" href="../css/dashboard.css">
</head>
<body>

<div class="sidebar">
  <h2>Fox LT</h2>

  <a href="/home/">Home</a>
  <a href="/perfil/">Perfil</a>
  <a href="/sistema/">Sistema</a>

  <!-- ADMIN MENU -->
  <div id="adminMenu" style="display:none;">
    <button onclick="toggleAdminMenu()" class="admin-btn">
      Admin ▼
    </button>

    <div id="adminSubmenu" class="submenu">
      <a href="/dashboard/">Painel Admin</a>
      <a href="/adminlg/">Login Admin</a>
    </div>
  </div>

  <button onclick="logout()">Sair</button>
</div>

<div class="main">
  <h1>Bem-vindo ao Dashboard</h1>

  <div class="card">
    <h3>Status da conta</h3>
    <p id="roleText">carregando...</p>
  </div>

  <div class="card">
    <h3>Sistema</h3>
    <p>Fox LT rodando normalmente 🚀</p>
  </div>
</div>

<script>
async function loadDashboard() {
  try {
    const res = await fetch("https://foxlt-site.onrender.com/dashboard-data", {
      method: "GET",
      credentials: "include"
    });

    if (!res.ok) {
      window.location.href = "/";
      return;
    }

    const data = await res.json();

    const role = data.user.role;

    document.getElementById("roleText").innerText =
      "Cargo: " + role;

    if (role === "admin") {
      document.getElementById("adminPanel").style.display = "block";
    }

  } catch (error) {
    window.location.href = "/";
  }
}

async function logout() {
  await fetch("https://foxlt-site.onrender.com/logout", {
    method: "POST",
    credentials: "include"
  });

  window.location.href = "/";
}

loadDashboard();
</script>

</body>
</html>
