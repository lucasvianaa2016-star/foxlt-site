<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>FOX LT - Dashboard V2</title>
  <link rel="stylesheet" href="/css/style.css">
</head>
<body>

<main class="container">

  <header class="topo">
    <h1>🦊 FOX LT</h1>
    <p id="welcome">Bem-vindo, jogador!</p>
  </header>

  <section class="card">
    <h3>💰 Money</h3>
    <p id="money">0</p>
  </section>

  <section class="card">
    <h3>🏆 Rankup</h3>
    <p id="rank">Iniciante</p>
  </section>

  <section class="card">
    <h3>⭐ Pontos</h3>
    <p id="points">0</p>
  </section>

  <section class="card">
    <h3>🎮 Conta Minecraft</h3>
    <p id="mcstatus">Não vinculada</p>
  </section>

  <section class="actions">

    <button onclick="gerarCodigo()">🔗 Linkar Minecraft</button>
    <p id="codigoLink"></p> 

    <button onclick="dailyReward()">🎁 Recompensa diária</button>

    <button onclick="shopVip()">🛒 Loja VIP</button>

    <button onclick="missions()">📜 Missões</button>

    <button onclick="ranking()">🏅 Ranking</button>

    <button onclick="discord()">💬 Discord</button>

    <button onclick="logout()">🚪 Sair</button>

  </section>

</main>

<script>
function gerarCodigo(){
  let chars = "ABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789";
  let codigo = "";

  for(let i = 0; i < 6; i++){
    codigo += chars[Math.floor(Math.random() * chars.length)];
  }

  document.getElementById("codigoLink").innerText =
    "Digite no servidor: /link " + codigo;
}

function dailyReward(){
  alert("Recompensa diária resgatada!");
}

function shopVip(){
  alert("Loja VIP em breve.");
}

function missions(){
  alert("Missões em breve.");
}

function ranking(){
  alert("Ranking em breve.");
}

function discord(){
  window.open("https://discord.gg/", "_blank");
}
</script>

</body>
</html>
