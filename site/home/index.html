<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Fox LT - Dashboard</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <main class="container">

    <header class="topo">
      <h1>🦊 FOX LT</h1>
      <p id="welcome">Carregando usuário...</p>
    </header>

    <section class="card">
      <h3>💰 Money (Survival)</h3>
      <p id="money">0</p>
    </section>

    <section class="card">
      <h3>🏆 Rankup</h3>
      <p id="rank">Iniciante</p>
    </section>

    <section class="card">
      <h3>⭐ Pontos</h3>
      <p id="points">0</p>
    </section>

    <section class="card">
      <h3>🎮 Conta Minecraft</h3>
      <p id="mcstatus">Não vinculada</p>
    </section>

    <footer class="acoes">
      <button onclick="logout()">Sair</button>
    </footer>

  </main>

</body>
</html>
